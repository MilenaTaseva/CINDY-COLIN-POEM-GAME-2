#poemBox {
  position: absolute;
  right: 2.6%;
  top: 10%;
  width: 50%;
  text-align: center;
  z-index: 20;
  pointer-events: none;
}

.title {
  font-size: clamp(27px, 3.3vw, 55px);
  font-weight: 900;
  color: #ff4f86;
  margin-bottom: 12px;
  text-shadow:
    0 3px 0 #ffffff,
    0 0 10px #ffffff,
    0 0 20px rgba(255,255,255,.85);
}

.line {
  margin: 11px 0;
  font-size: clamp(25px, 3.05vw, 51px);
  font-weight: 900;
  line-height: 1.18;
  color: #2b1608;
  text-shadow:
    0 3px 0 #ffffff,
    0 0 9px rgba(255,255,255,.98),
    0 0 17px rgba(255,255,255,.85);
}

.word {
  display: inline-block;
  margin: 0 5px;
  padding: 0 4px;
  border-radius: 13px;
  transition: transform .22s ease, color .22s ease, text-shadow .22s ease, background .22s ease, filter .22s ease;
}

.pink {
  color:#ff4f86;
  text-shadow:0 3px 0 white, 0 0 9px #ffd1df;
}

.blue {
  color:#1178dc;
  text-shadow:0 3px 0 white, 0 0 9px #cde6ff;
}

.green {
  color:#52a51f;
  text-shadow:0 3px 0 white, 0 0 9px #ddffd2;
}

.orange {
  color:#ff8a00;
  text-shadow:0 3px 0 white, 0 0 9px #ffe0bb;
}

.purple {
  color:#8555df;
  text-shadow:0 3px 0 white, 0 0 9px #e5dbff;
}

.word.active {
  transform: scale(1.48) translateY(-9px);
  color: #fff04d !important;
  background: rgba(255,255,255,.30);
  filter: brightness(1.15);
  text-shadow:
    0 3px 0 #7a3200,
    0 0 10px #ffffff,
    0 0 20px #fff27a,
    0 0 30px rgba(0,0,0,.95) !important;
}

#controls {
  position: absolute;
  left: 50%;
  bottom: 4.5%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  z-index: 100;
  padding: 12px 16px;
  border-radius: 28px;
  background: rgba(255,255,255,.76);
  box-shadow: 0 8px 22px rgba(0,0,0,.35);
}

button.control {
  border: 4px solid white;
  border-radius: 22px;
  padding: 14px 28px;
  font-size: 23px;
  font-weight: 900;
  cursor: pointer;
  color: white;
  text-shadow: 0 2px 0 rgba(0,0,0,.35);
  box-shadow: 0 5px 0 rgba(0,0,0,.28), 0 8px 18px rgba(0,0,0,.32);
}

#playBtn { background: linear-gradient(#92e84a,#37a900); }
#pauseBtn { background: linear-gradient(#ffd86a,#ff9d00); }
#resumeBtn { background: linear-gradient(#5ebeff,#047fd4); }
#replayBtn { background: linear-gradient(#b785ff,#7338d8); }

button:hover {
  transform: translateY(-2px);
}

button:active {
  transform: translateY(3px);
}

#hint {
  position: absolute;
  left: 50%;
  bottom: .8%;
  transform: translateX(-50%);
  color: #fff7c7;
  font-size: 23px;
  font-weight: 900;
  text-shadow: 0 3px 0 #3d1f00, 0 0 12px rgba(0,0,0,.9);
  z-index: 90;
}

@media (max-width: 900px) {
  #poemBox {
    right: 1.5%;
    top: 7%;
    width: 56%;
  }
  #controls {
    gap: 8px;
    padding: 8px;
  }
  button.control {
    font-size: 16px;
    padding: 10px 12px;
    border-width: 2px;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="poemBox">
    <div class="title">Learn the Poem!</div>
  </div>

  <div id="controls">
    <button class="control" id="playBtn" onclick="playPoem()">PLAY</button>
    <button class="control" id="pauseBtn" onclick="pausePoem()">PAUSE</button>
    <button class="control" id="resumeBtn" onclick="resumePoem()">Resume</button>
    <button class="control" id="replayBtn" onclick="replayPoem()">Replay</button>
  </div>

  <div id="hint">Click PLAY to hear the poem!</div>
</div>

<script>
const poemLines = [["Cindy", "and", "Colin", "are", "hungry", "today,"], ["Looking", "for", "C", "fish", "all", "the", "way."], ["Catch", "the", "fish", "with", "C", "today,"], ["Let", "the", "hungry", "kittens", "play!"]];
const poemText = "Cindy and Colin are hungry today, Looking for C fish all the way. Catch the fish with C today, Let the hungry kittens play!";
const wordMap = [{"word": "Cindy", "start": 0, "end": 5}, {"word": "and", "start": 6, "end": 9}, {"word": "Colin", "start": 10, "end": 15}, {"word": "are", "start": 16, "end": 19}, {"word": "hungry", "start": 20, "end": 26}, {"word": "today,", "start": 27, "end": 33}, {"word": "Looking", "start": 34, "end": 41}, {"word": "for", "start": 42, "end": 45}, {"word": "C", "start": 46, "end": 47}, {"word": "fish", "start": 48, "end": 52}, {"word": "all", "start": 53, "end": 56}, {"word": "the", "start": 57, "end": 60}, {"word": "way.", "start": 61, "end": 65}, {"word": "Catch", "start": 66, "end": 71}, {"word": "the", "start": 72, "end": 75}, {"word": "fish", "start": 76, "end": 80}, {"word": "with", "start": 81, "end": 85}, {"word": "C", "start": 86, "end": 87}, {"word": "today,", "start": 88, "end": 94}, {"word": "Let", "start": 95, "end": 98}, {"word": "the", "start": 99, "end": 102}, {"word": "hungry", "start": 103, "end": 109}, {"word": "kittens", "start": 110, "end": 117}, {"word": "play!", "start": 118, "end": 123}];
const poemBox = document.getElementById("poemBox");

let wordSpans = [];
let utterance = null;
let playing = false;
let paused = false;
let fallbackTimer = null;
let fallbackIndex = 0;

function buildText() {
  poemLines.forEach(line => {
    const div = document.createElement("div");
    div.className = "line";
    line.forEach(word => {
      const span = document.createElement("span");
      span.className = "word " + getColor(word);
      span.textContent = word;
      div.appendChild(span);
      div.appendChild(document.createTextNode(" "));
    });
    poemBox.appendChild(div);
  });
  wordSpans = Array.from(document.querySelectorAll(".word"));
}

function getColor(word) {
  const clean = word.replace(/[,!.]/g, "");
  if (clean === "Cindy" || clean === "hungry" || clean === "kittens") return "pink";
  if (clean === "Colin" || clean === "C") return "blue";
  if (clean === "fish") return "green";
  if (clean === "Catch" || clean === "play") return "orange";
  if (clean === "Looking" || clean === "way") return "purple";
  return "";
}

function chooseVoice() {
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang.startsWith("en") && /female|woman|samantha|zira|susan|karen|victoria|aria|jenny|serena|ava/i.test(v.name))
      || voices.find(v => v.lang.startsWith("en"))
      || null;
}

function clearActive() {
  wordSpans.forEach(w => w.classList.remove("active"));
}

function activateWord(index) {
  clearActive();
  if (index >= 0 && index < wordSpans.length) {
    wordSpans[index].classList.add("active");
  }
}

function wordIndexFromChar(charIndex) {
  for (let i = 0; i < wordMap.length; i++) {
    if (charIndex >= wordMap[i].start && charIndex <= wordMap[i].end) return i;
  }
  let best = 0;
  for (let i = 0; i < wordMap.length; i++) {
    if (wordMap[i].start <= charIndex) best = i;
  }
  return best;
}

function fallbackAnimate() {
  if (!playing || paused) return;
  activateWord(fallbackIndex);
  fallbackIndex++;
  if (fallbackIndex < wordSpans.length) {
    fallbackTimer = setTimeout(fallbackAnimate, 520);
  }
}

function playPoem() {
  clearTimeout(fallbackTimer);
  speechSynthesis.cancel();
  clearActive();
  fallbackIndex = 0;
  playing = true;
  paused = false;

  utterance = new SpeechSynthesisUtterance(poemText);
  utterance.lang = "en-US";
  utterance.rate = 0.78;
  utterance.pitch = 1.25;
  utterance.volume = 1;

  const voice = chooseVoice();
  if (voice) utterance.voice = voice;

  let boundaryWorked = false;

  utterance.onboundary = function(event) {
    if (event.name === "word" || event.charIndex >= 0) {
      boundaryWorked = true;
      const idx = wordIndexFromChar(event.charIndex);
      activateWord(idx);
    }
  };

  utterance.onstart = function() {
    setTimeout(() => {
      if (!boundaryWorked && playing && !paused) {
        fallbackAnimate();
      }
    }, 450);
  };

  utterance.onend = function() {
    clearTimeout(fallbackTimer);
    setTimeout(() => {
      clearActive();
      playing = false;
    }, 600);
  };

  speechSynthesis.speak(utterance);
}

function pausePoem() {
  if (!playing) return;
  paused = true;
  clearTimeout(fallbackTimer);
  speechSynthesis.pause();
}

function resumePoem() {
  if (!playing) return;
  paused = false;
  speechSynthesis.resume();
  fallbackTimer = setTimeout(fallbackAnimate, 250);
}

function replayPoem() {
  playPoem();
}

speechSynthesis.onvoiceschanged = chooseVoice;
buildText();
</script>
</body>
